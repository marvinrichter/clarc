name: Deploy Hub

on:
  push:
    branches: [main]
    paths:
      - 'agents/**'
      - 'skills/**'
      - 'commands/**'
      - 'scripts/ci/generate-hub.js'
      - 'docs/hub/style.css'
      - 'docs/hub/search.js'

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Only one deploy runs at a time
concurrency:
  group: hub-deploy
  cancel-in-progress: false

jobs:
  build:
    name: Build Hub
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Generate Hub
        run: node scripts/ci/generate-hub.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/hub

  deploy:
    name: Deploy Hub
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
