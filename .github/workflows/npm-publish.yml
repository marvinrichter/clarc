# STATUS: WORKFLOW DEAKTIVIERT
# Publish-Entscheidung steht aus. Voraussetzungen vor Aktivierung:
#   [ ] clarc 1.0.0-Stable erreicht
#   [ ] npm 2FA auf Account aktiviert
#   [ ] Supply-Chain-Security-Review abgeschlossen
#   [ ] Bewusste Entscheidung: Security-Trade-off npm vs. GitHub-Install akzeptiert
#
# Primary install method bleibt: npx github:marvinrichter/clarc
# (kein npm-Registry-Angriffspunkt, kein Supply-Chain-Risiko)

name: npm Publish (manual, disabled)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type PUBLISH to confirm npm release'
        required: true
        type: string

jobs:
  publish:
    name: Publish to npm
    if: github.event.inputs.confirm == 'PUBLISH'
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # npm Provenance Attestation
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version in package.json
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Publishing version: $VERSION"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "ERROR: Pre-release version detected ($VERSION). Only stable releases may be published."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Publish with Provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
