name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'CONTRIBUTING.md'
      - 'CODE_OF_CONDUCT.md'
      - 'SECURITY.md'
      - 'LICENSE'
      - 'docs/**'
      - 'examples/**'
  pull_request:
    branches: [main]

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Minimal permissions
permissions:
  contents: read

jobs:
  # Detects which paths changed so downstream jobs can skip when unnecessary.
  # Always runs on pull_request — this is what lets ci-required post a status
  # even when only docs files (e.g. CHANGELOG.md) changed.
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'scripts/**'
              - 'tests/**'
              - 'agents/**'
              - 'skills/**'
              - 'commands/**'
              - 'hooks/**'
              - 'rules/**'
              - 'package.json'
              - 'package-lock.json'
              - '.eslintrc*'
              - 'eslint.config*'

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # On push: `changes` is skipped (push has workflow-level paths-ignore instead),
    # but this job still runs because github.event_name == 'push' is true.
    # On PR: only runs when source files changed (changes.outputs.src == 'true').
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.src == 'true'
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint scripts/**/*.js tests/**/*.js

      - name: Run markdownlint
        run: npx markdownlint "agents/**/*.md" "skills/**/*.md" "commands/**/*.md" "rules/**/*.md"

  validate:
    name: Validate Components
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.src == 'true'
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Validate agents
        run: node scripts/ci/validate-agents.js

      - name: Validate hooks
        run: node scripts/ci/validate-hooks.js

      - name: Validate commands
        run: node scripts/ci/validate-commands.js

      - name: Validate skills
        run: node scripts/ci/validate-skills.js

      - name: Validate rules
        run: node scripts/ci/validate-rules.js

      - name: Validate wiring (cross-component references)
        run: node scripts/ci/validate-wiring.js

      - name: Validate naming conventions
        run: node scripts/ci/validate-naming.js

      - name: Generate coverage map (informational)
        run: node scripts/ci/generate-coverage-map.js
        continue-on-error: true

      - name: Upload coverage map
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-map
          path: docs/system-review/coverage-map.md
          if-no-files-found: ignore

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.src == 'true'
    needs: [changes]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Run npm audit
        run: npm audit --audit-level=high

  # Standard matrix — all OS × all Node versions × npm
  # Runs on every push and PR for fast cross-platform feedback
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }}, ${{ matrix.pm }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    if: |
      github.event_name == 'push' ||
      needs.changes.outputs.src == 'true'
    needs: [changes]

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: ['20.x', '22.x', '24.x']
        pm: [npm]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ matrix.node }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-npm-

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: node tests/run-all.js
        env:
          CLAUDE_CODE_PACKAGE_MANAGER: ${{ matrix.pm }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-node${{ matrix.node }}-${{ matrix.pm }}
          path: |
            tests/
            !tests/node_modules/

  # Extended PM matrix — ubuntu × LTS × pnpm/yarn/bun
  # Runs on main push only — verifies alternative package managers after merge
  test-pm-compat:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }}, ${{ matrix.pm }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        node: ['22.x']
        pm: [pnpm, yarn, bun]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Setup pnpm
        if: matrix.pm == 'pnpm'
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Bun
        if: matrix.pm == 'bun'
        uses: oven-sh/setup-bun@v2

      - name: Get pnpm store directory
        if: matrix.pm == 'pnpm'
        id: pnpm-cache-dir
        shell: bash
        run: echo "dir=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm
        if: matrix.pm == 'pnpm'
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ matrix.node }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-pnpm-

      - name: Get yarn cache directory
        if: matrix.pm == 'yarn'
        id: yarn-cache-dir
        shell: bash
        run: |
          if yarn config get cacheFolder >/dev/null 2>&1; then
            echo "dir=$(yarn config get cacheFolder)" >> $GITHUB_OUTPUT
          else
            echo "dir=$(yarn cache dir)" >> $GITHUB_OUTPUT
          fi

      - name: Cache yarn
        if: matrix.pm == 'yarn'
        uses: actions/cache@v5
        with:
          path: ${{ steps.yarn-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ matrix.node }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node }}-yarn-

      - name: Cache bun
        if: matrix.pm == 'bun'
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        shell: bash
        run: |
          case "${{ matrix.pm }}" in
            pnpm) pnpm install ;;
            yarn) yarn install --ignore-engines ;;
            bun)  bun install ;;
          esac

      - name: Run tests
        run: node tests/run-all.js
        env:
          CLAUDE_CODE_PACKAGE_MANAGER: ${{ matrix.pm }}

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-${{ matrix.os }}-node${{ matrix.node }}-${{ matrix.pm }}
          path: |
            tests/
            !tests/node_modules/

  # Required status check for branch protection.
  # Always runs on pull_request — posts green when jobs were skipped (docs-only PR),
  # posts red when any job failed. Set THIS job as the required check, not the
  # individual lint/validate/security/test jobs.
  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    if: always() && github.event_name == 'pull_request'
    needs: [changes, lint, validate, security, test]
    steps:
      - name: Check results
        run: |
          results='${{ toJSON(needs) }}'
          echo "Job results: $results"
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          if echo "$results" | grep -q '"result": "cancelled"'; then
            echo "One or more CI jobs were cancelled."
            exit 1
          fi
          echo "All CI checks passed or were skipped (docs-only change)."
