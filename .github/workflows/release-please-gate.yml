name: Release Please Gate

# Release Please PRs are created by GITHUB_TOKEN, which does not trigger
# pull_request events. This workflow fires on push to the release-please
# branch instead, posting the required "CI Required" status so the PR
# can be merged without being blocked by branch protection.

on:
  push:
    branches:
      - 'release-please--**'

jobs:
  ci-required:
    name: CI Required
    runs-on: ubuntu-latest
    steps:
      - name: Pass — release-please PRs only touch CHANGELOG and package.json
        run: echo "Release Please PR contains no src changes. CI gate passes."
