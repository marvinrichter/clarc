name: Bug Report
description: Something is broken or behaving unexpectedly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a bug, run `npx github:marvinrichter/clarc doctor` and include the output below.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `/command`
        2. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: doctor
    attributes:
      label: Doctor output
      description: Output of `npx github:marvinrichter/clarc doctor`
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: OS
      options:
        - macOS
        - Linux
        - Windows
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node version
      placeholder: "e.g. 22.1.0"
